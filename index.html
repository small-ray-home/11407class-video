<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青埔影音教學平台 | 終極修正版</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f8fafc; }
    .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
    video { width: 100%; border-radius: 1rem; background: #000; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
  </style>
</head>
<body>

  <div id="loginView" class="fixed inset-0 bg-slate-900 flex items-center justify-center p-4 z-50">
    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm border border-slate-100">
      <div class="text-center mb-10">
        <div class="bg-indigo-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 text-white shadow-lg">
          <i data-lucide="shield-check"></i>
        </div>
        <h1 class="text-xl font-black text-slate-800 uppercase tracking-tight">System Login</h1>
        <p class="text-slate-400 text-xs mt-2 font-medium">請輸入帳號密碼以開啟教材</p>
      </div>
      <div class="space-y-4">
        <input id="u" type="text" placeholder="帳號 (admin / 707)" class="w-full border-2 border-slate-50 bg-slate-50 p-4 rounded-2xl outline-none focus:border-indigo-500 focus:bg-white transition-all font-bold">
        <input id="p" type="password" placeholder="密碼" class="w-full border-2 border-slate-50 bg-slate-50 p-4 rounded-2xl outline-none focus:border-indigo-500 focus:bg-white transition-all font-bold">
        <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">登入系統</button>
      </div>
      <p id="errMsg" class="text-red-500 text-center mt-6 text-sm hidden font-bold animate-pulse">⚠️ 驗證失敗，請檢查輸入</p>
    </div>
  </div>

  <div id="appView" class="hidden">
    <nav class="glass border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-10 shadow-sm">
      <div class="font-black text-indigo-600 text-lg flex items-center gap-2 italic">
        <i data-lucide="play-circle" class="w-5 h-5"></i> QINGPU.EDU
      </div>
      <div class="flex items-center gap-4">
        <span id="userBadge" class="text-[10px] font-black px-3 py-1 bg-indigo-50 text-indigo-500 rounded-full uppercase tracking-widest"></span>
        <button onclick="location.reload()" class="text-slate-300 hover:text-red-500 transition-colors"><i data-lucide="log-out" class="w-5 h-5"></i></button>
      </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 pb-24">
      <section id="adminPanel" class="hidden bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 mb-10">
        <h2 class="font-black text-slate-700 mb-6 flex items-center gap-2 text-lg"><i data-lucide="upload-cloud" class="text-indigo-500"></i> 上傳教學影片</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input id="cat" type="text" placeholder="課程分類 (如: 707 班)" class="border-2 border-slate-50 p-4 rounded-xl font-bold bg-slate-50 outline-none focus:border-indigo-500 focus:bg-white">
          <input id="vName" type="text" placeholder="影片標題" class="border-2 border-slate-50 p-4 rounded-xl font-bold bg-slate-50 outline-none focus:border-indigo-500 focus:bg-white">
          <div class="md:col-span-2 border-2 border-dashed border-slate-200 p-8 rounded-2xl text-center cursor-pointer hover:bg-indigo-50 transition-all group" onclick="document.getElementById('vFile').click()">
            <input id="vFile" type="file" accept="video/*" class="hidden">
            <p id="fileNameDisplay" class="text-sm font-black text-slate-400">點擊此處選擇影片檔案</p>
          </div>
          <button id="uploadBtn" onclick="uploadVideo()" class="md:col-span-2 bg-slate-800 text-white py-5 rounded-2xl font-black shadow-xl hover:bg-black active:scale-95 disabled:opacity-50 transition-all">開始安全上傳</button>
        </div>
        <div id="progressBox" class="hidden mt-6 bg-slate-100 h-2 rounded-full overflow-hidden">
          <div id="progressBar" class="bg-indigo-600 h-full w-full animate-pulse"></div>
        </div>
      </section>

      <div id="courseList" class="space-y-8"></div>
    </main>
  </div>

  <script>
    const SUPABASE_URL = 'https://cadqyiezwqdhrinulzse.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_8j_PMspCDypszSJc4M8icg_Qf-3YO0U'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- 安全雜湊密鑰 (已修正學生密碼環境) ---
    const T_HASH = "86782d1c67ca8d268802996d934277b0683058df3f24f5a3311904a4413e1f74"; // admin 密碼指紋
    const S_HASH = "5b60f221d4a1852a380962bb63198031d23450e185f52643a604246985392e92"; // 707 密碼指紋 (包含你環境中的特殊字元)

    let role = null;

    // 核心：SHA-256 轉換引擎
    async function sha256(str) {
      const buffer = new TextEncoder().encode(str);
      const hash = await crypto.subtle.digest('SHA-256', buffer);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // 登入驗證邏輯
    async function handleLogin() {
      // 強制去除所有空白字元與換行
      const u = document.getElementById('u').value.replace(/\s+/g, ''); 
      const p = document.getElementById('p').value.replace(/\s+/g, ''); 
      const err = document.getElementById('errMsg');
      
      if(!u || !p) return;

      const inputHash = await sha256(p);

      if (u === 'admin' && inputHash === T_HASH) { 
        role = 'teacher'; 
        enterApp('教師'); 
      }
      else if (u === '707' && (inputHash === S_HASH || inputHash === "9079590483863777d48347f892800164c9d9f58315270216b2518e3845b46d95")) { 
        // 學生帳號同時支援「純淨 707」與「帶特殊符號的 707」指紋
        role = 'student'; 
        enterApp('學生'); 
      }
      else {
        err.classList.remove('hidden');
        setTimeout(() => err.classList.add('hidden'), 3000);
      }
    }

    function enterApp(label) {
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('appView').classList.remove('hidden');
      document.getElementById('userBadge').innerText = label + '模式已啟動';
      if (role === 'teacher') document.getElementById('adminPanel').classList.remove('hidden');
      fetchCourses();
    }

    // 上傳影片 (修正中文字元檔名問題)
    async function uploadVideo() {
      const cat = document.getElementById('cat').value.trim();
      const name = document.getElementById('vName').value.trim();
      const file = document.getElementById('vFile').files[0];
      const btn = document.getElementById('uploadBtn');

      if (!cat || !name || !file) return alert('請完整填寫並選擇檔案');

      btn.disabled = true;
      btn.innerText = '正在加密上傳...';
      document.getElementById('progressBox').classList.remove('hidden');
      
      const fileExt = file.name.split('.').pop();
      const safeFileName = `${Date.now()}.${fileExt}`;

      const { data, error: storageError } = await _supabase.storage.from('videos').upload(safeFileName, file);

      if (storageError) {
        alert('上傳失敗：' + storageError.message);
        btn.disabled = false;
        btn.innerText = '開始安全上傳';
        return;
      }

      const { data: { publicUrl } } = _supabase.storage.from('videos').getPublicUrl(safeFileName);
      await _supabase.from('courses').insert([{ category: cat, name: name, url: publicUrl, file_path: safeFileName }]);

      alert('影片發佈成功！');
      document.getElementById('vName').value = '';
      document.getElementById('vFile').value = '';
      document.getElementById('fileNameDisplay').innerText = '點擊此處選擇影片檔案';
      btn.disabled = false;
      btn.innerText = '開始安全上傳';
      document.getElementById('progressBox').classList.add('hidden');
      fetchCourses();
    }

    // 抓取教材並渲染播放器
    async function fetchCourses() {
      const { data, error } = await _supabase.from('courses').select('*').order('created_at', { ascending: false });
      const container = document.getElementById('courseList');
      const groups = (data || []).reduce((acc, obj) => {
        (acc[obj.category] = acc[obj.category] || []).push(obj);
        return acc;
      }, {});

      let html = '';
      for (const cat in groups) {
        html += `
          <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
            <div class="px-8 py-4 bg-slate-50 border-b font-black text-slate-400 text-[10px] tracking-widest uppercase flex justify-between">
               <span><i data-lucide="folder" class="inline w-3 h-3 mr-1"></i> ${cat}</span>
               <span>共 ${groups[cat].length} 部影片</span>
            </div>
            <div class="p-6 space-y-4">
              ${groups[cat].map(i => `
                <div class="border border-slate-50 rounded-2xl overflow-hidden bg-white shadow-sm">
                  <div class="px-6 py-4 flex justify-between items-center bg-white">
                    <span class="font-bold text-slate-700">${i.name}</span>
                    <div class="flex items-center gap-3">
                      <button onclick="togglePlayer('${i.id}')" class="bg-indigo-600 text-white px-6 py-2 rounded-xl text-xs font-black flex items-center gap-2 shadow-md hover:bg-indigo-700 transition">
                        展開播放 <i data-lucide="play" class="w-3 h-3 fill-current"></i>
                      </button>
                      ${role === 'teacher' ? `<button onclick="deleteCourse('${i.id}', '${i.file_path}')" class="text-slate-200 hover:text-red-500 transition"><i data-lucide="trash-2" class="w-5 h-5"></i></button>` : ''}
                    </div>
                  </div>
                  <div id="player-${i.id}" class="hidden p-4 bg-slate-900">
                    <video controls controlsList="nodownload" preload="none">
                      <source src="${i.url}" type="video/mp4">
                    </video>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }
      container.innerHTML = html || '<div class="text-center py-20 text-slate-300 font-bold uppercase text-xs">目前暫無教學資源</div>';
      lucide.createIcons();
    }

    function togglePlayer(id) {
      const player = document.getElementById(`player-${id}`);
      const isHidden = player.classList.contains('hidden');
      document.querySelectorAll('[id^="player-"]').forEach(el => { el.classList.add('hidden'); el.querySelector('video').pause(); });
      if (isHidden) { player.classList.remove('hidden'); player.querySelector('video').play(); }
    }

    async function deleteCourse(id, filePath) {
      if (!confirm('確定要永久刪除這部影片嗎？')) return;
      await _supabase.from('courses').delete().eq('id', id);
      if (filePath) await _supabase.storage.from('videos').remove([filePath]);
      fetchCourses();
    }

    document.getElementById('vFile').onchange = (e) => { document.getElementById('fileNameDisplay').innerText = e.target.files[0]?.name || '尚未選擇檔案'; };
    lucide.createIcons();
  </script>
</body>
</html>
