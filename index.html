<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青埔影音教學平台 | 資料庫驗證版</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f8fafc; }
    .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
    video { width: 100%; border-radius: 1.5rem; background: #000; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2); }
  </style>
</head>
<body>

  <div id="loginView" class="fixed inset-0 bg-slate-900 flex items-center justify-center p-4 z-50">
    <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-sm border-4 border-indigo-50">
      <div class="text-center mb-10">
        <div class="bg-indigo-600 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-4 text-white shadow-xl">
          <i data-lucide="database"></i>
        </div>
        <h1 class="text-xl font-black text-slate-800 uppercase tracking-tighter">Database Login</h1>
        <p class="text-slate-400 text-xs mt-2 font-bold">雲端帳號同步驗證中</p>
      </div>
      <div class="space-y-4">
        <input id="u" type="text" placeholder="帳號" class="w-full border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-indigo-600 font-bold bg-slate-50 transition-all">
        <input id="p" type="password" placeholder="密碼" class="w-full border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-indigo-600 font-bold bg-slate-50 transition-all">
        <button id="loginBtn" onclick="handleDatabaseLogin()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all">登入系統</button>
      </div>
      <p id="errMsg" class="text-red-500 text-center mt-6 text-sm hidden font-black animate-pulse">❌ 帳號密碼錯誤，請重新確認</p>
    </div>
  </div>

  <div id="appView" class="hidden">
    <nav class="glass border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-10 shadow-sm">
      <div class="font-black text-indigo-600 text-lg flex items-center gap-2 italic">
        <i data-lucide="zap" class="w-5 h-5 fill-current"></i> QINGPU.EDU
      </div>
      <div class="flex items-center gap-4">
        <span id="userBadge" class="text-[10px] font-black px-4 py-1.5 bg-indigo-50 text-indigo-500 rounded-full border border-indigo-100 uppercase tracking-widest"></span>
        <button onclick="location.reload()" class="text-slate-300 hover:text-red-500 transition-colors"><i data-lucide="log-out" class="w-5 h-5"></i></button>
      </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 pb-24">
      <section id="adminPanel" class="hidden bg-white p-8 rounded-[2.5rem] shadow-sm border-2 border-slate-50 mb-10">
        <h2 class="font-black text-slate-700 mb-6 flex items-center gap-2 text-lg"><i data-lucide="plus-circle" class="text-indigo-600"></i> 發佈新教材</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input id="cat" type="text" placeholder="課程分類 (如: 707)" class="border-2 border-slate-100 p-4 rounded-xl font-bold outline-none focus:border-indigo-500 transition-all">
          <input id="vName" type="text" placeholder="影片名稱" class="border-2 border-slate-100 p-4 rounded-xl font-bold outline-none focus:border-indigo-500 transition-all">
          <div class="md:col-span-2 border-2 border-dashed border-slate-200 p-10 rounded-3xl text-center cursor-pointer hover:bg-indigo-50 transition-all group" onclick="document.getElementById('vFile').click()">
            <input id="vFile" type="file" accept="video/*" class="hidden">
            <div class="text-indigo-400 mb-2 group-hover:scale-110 transition-transform"><i data-lucide="video" class="mx-auto w-8 h-8"></i></div>
            <p id="fileNameDisplay" class="text-sm font-bold text-slate-400">點擊此處選取影片檔案</p>
          </div>
          <button id="uploadBtn" onclick="uploadVideo()" class="md:col-span-2 bg-slate-900 text-white py-5 rounded-2xl font-black shadow-xl hover:bg-black transition-all">確認發佈至雲端</button>
        </div>
        <div id="progressBox" class="hidden mt-6 bg-slate-100 h-2 rounded-full overflow-hidden">
          <div id="progressBar" class="bg-indigo-600 h-full w-full animate-pulse"></div>
        </div>
      </section>

      <div id="courseList" class="space-y-10"></div>
    </main>
  </div>

  <script>
    const _supabase = supabase.createClient('https://cadqyiezwqdhrinulzse.supabase.co', 'sb_publishable_8j_PMspCDypszSJc4M8icg_Qf-3YO0U');
    let role = null;

    // --- 🔑 從資料庫驗證帳號密碼 ---
    async function handleDatabaseLogin() {
      const u = document.getElementById('u').value.trim();
      const p = document.getElementById('p').value.trim();
      const err = document.getElementById('errMsg');
      const btn = document.getElementById('loginBtn');
      
      if (!u || !p) return;

      btn.disabled = true;
      btn.innerText = "驗證中...";

      // 到資料庫查詢符合帳號與密碼的資料
      const { data, error } = await _supabase
        .from('users')
        .select('*')
        .eq('username', u)
        .eq('password', p)
        .single();

      if (error || !data) {
        err.classList.remove('hidden');
        btn.disabled = false;
        btn.innerText = "登入系統";
        setTimeout(() => err.classList.add('hidden'), 3000);
      } else {
        role = data.role; // 取得資料庫中設定的權限 (teacher/student)
        enterApp(data.username);
      }
    }

    function enterApp(name) {
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('appView').classList.remove('hidden');
      document.getElementById('userBadge').innerText = `${name} (${role === 'teacher' ? '教師' : '學生'})`;
      if (role === 'teacher') document.getElementById('adminPanel').classList.remove('hidden');
      fetchCourses();
    }

    // --- 影片上傳邏輯 ---
    async function uploadVideo() {
      const cat = document.getElementById('cat').value.trim();
      const name = document.getElementById('vName').value.trim();
      const file = document.getElementById('vFile').files[0];
      const btn = document.getElementById('uploadBtn');

      if (!cat || !name || !file) return alert('請填寫完整資訊');

      btn.disabled = true;
      btn.innerText = '正在處理雲端同步...';
      document.getElementById('progressBox').classList.remove('hidden');
      
      const safeFileName = `${Date.now()}.${file.name.split('.').pop()}`;
      const { data, error: storageError } = await _supabase.storage.from('videos').upload(safeFileName, file);

      if (storageError) {
        alert('上傳失敗：' + storageError.message);
        btn.disabled = false; return;
      }

      const { data: { publicUrl } } = _supabase.storage.from('videos').getPublicUrl(safeFileName);
      await _supabase.from('courses').insert([{ category: cat, name: name, url: publicUrl, file_path: safeFileName }]);

      alert('影片已成功發佈！');
      btn.disabled = false;
      btn.innerText = '確認發佈至雲端';
      document.getElementById('progressBox').classList.add('hidden');
      fetchCourses();
    }

    // --- 抓取與渲染 ---
    async function fetchCourses() {
      const { data } = await _supabase.from('courses').select('*').order('created_at', { ascending: false });
      const container = document.getElementById('courseList');
      const groups = (data || []).reduce((acc, obj) => {
        (acc[obj.category] = acc[obj.category] || []).push(obj);
        return acc;
      }, {});

      let html = '';
      for (const cat in groups) {
        html += `
          <div class="bg-white rounded-[3rem] shadow-sm border border-slate-100 overflow-hidden">
            <div class="px-10 py-5 bg-slate-50 border-b font-black text-slate-400 text-[10px] tracking-[0.2em] flex justify-between uppercase">
               <span><i data-lucide="folder" class="inline w-3 h-3 mr-1 text-indigo-500"></i> ${cat}</span>
               <span>${groups[cat].length} 資源</span>
            </div>
            <div class="p-8 space-y-6">
              ${groups[cat].map(i => `
                <div class="group border border-slate-50 rounded-3xl overflow-hidden bg-white shadow-sm hover:shadow-md transition-all">
                  <div class="px-8 py-5 flex justify-between items-center">
                    <span class="font-black text-slate-700 tracking-tight">${i.name}</span>
                    <div class="flex items-center gap-4">
                      <button onclick="togglePlayer('${i.id}')" class="bg-indigo-600 text-white px-7 py-2.5 rounded-2xl text-xs font-black shadow-lg hover:bg-indigo-700 transition active:scale-95">
                        觀看影片
                      </button>
                      ${role === 'teacher' ? `<button onclick="deleteCourse('${i.id}', '${i.file_path}')" class="text-slate-200 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button>` : ''}
                    </div>
                  </div>
                  <div id="player-${i.id}" class="hidden p-6 bg-slate-900 border-t border-slate-100">
                    <video controls controlsList="nodownload" preload="none"><source src="${i.url}" type="video/mp4"></video>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>`;
      }
      container.innerHTML = html || '<div class="text-center py-20 text-slate-300 font-bold uppercase tracking-widest text-xs">NO RESOURCES SYNCED</div>';
      lucide.createIcons();
    }

    function togglePlayer(id) {
      const player = document.getElementById(`player-${id}`);
      const isHidden = player.classList.contains('hidden');
      document.querySelectorAll('[id^="player-"]').forEach(el => { el.classList.add('hidden'); el.querySelector('video').pause(); });
      if (isHidden) { player.classList.remove('hidden'); player.querySelector('video').play(); }
    }

    async function deleteCourse(id, filePath) {
      if (!confirm('🚨 警告：確定要永久移除這部教學資源？')) return;
      await _supabase.from('courses').delete().eq('id', id);
      if (filePath) await _supabase.storage.from('videos').remove([filePath]);
      fetchCourses();
    }

    document.getElementById('vFile').onchange = (e) => { document.getElementById('fileNameDisplay').innerText = e.target.files[0]?.name || '尚未選取'; };
    lucide.createIcons();
  </script>
</body>
</html>
