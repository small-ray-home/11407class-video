<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青埔影音教學平台 | 檔案上傳版</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
    .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <div id="loginView" class="fixed inset-0 bg-slate-900 flex items-center justify-center p-4 z-50">
    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-sm">
      <div class="text-center mb-10">
        <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 text-white"><i data-lucide="upload-cloud"></i></div>
        <h1 class="text-xl font-bold text-slate-800">QINGPU VIDEO SYSTEM</h1>
      </div>
      <div class="space-y-4">
        <input id="u" type="text" placeholder="帳號" class="w-full border-2 p-4 rounded-2xl outline-none focus:border-blue-500 font-bold">
        <input id="p" type="password" placeholder="密碼" class="w-full border-2 p-4 rounded-2xl outline-none focus:border-blue-500 font-bold">
        <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">登入</button>
      </div>
    </div>
  </div>

  <div id="appView" class="hidden">
    <nav class="glass border-b px-6 py-4 flex justify-between items-center sticky top-0 z-10">
      <div class="font-black text-blue-600">QINGPU.EDU</div>
      <div class="flex items-center gap-4">
        <span id="userBadge" class="text-xs font-bold px-2 py-1 bg-slate-100 rounded"></span>
        <button onclick="location.reload()" class="text-slate-400 hover:text-red-500"><i data-lucide="log-out" class="w-5 h-5"></i></button>
      </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
      <section id="adminPanel" class="hidden bg-white p-8 rounded-[2.5rem] shadow-sm border mb-10">
        <h2 class="font-black text-slate-700 mb-6 flex items-center gap-2"><i data-lucide="file-up"></i> 上傳影片檔</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input id="cat" type="text" placeholder="分類 (例如：707 班)" class="border-2 p-4 rounded-xl font-bold">
          <input id="vName" type="text" placeholder="影片名稱" class="border-2 p-4 rounded-xl font-bold">
          <div class="md:col-span-2 border-2 border-dashed p-6 rounded-xl text-center">
            <input id="vFile" type="file" accept="video/*" class="hidden">
            <button onclick="document.getElementById('vFile').click()" class="bg-slate-100 px-6 py-2 rounded-lg font-bold mb-2">選擇影片檔案</button>
            <p id="fileNameDisplay" class="text-sm text-slate-400 italic">尚未選擇檔案</p>
          </div>
          <button id="uploadBtn" onclick="uploadVideo()" class="md:col-span-2 bg-blue-600 text-white py-4 rounded-xl font-black shadow-xl disabled:opacity-50">確認上傳影片</button>
        </div>
        <div id="progressBox" class="hidden mt-4 bg-slate-100 h-2 rounded-full overflow-hidden">
          <div id="progressBar" class="bg-blue-600 h-full w-0 transition-all"></div>
        </div>
      </section>

      <div id="courseList" class="space-y-6"></div>
    </main>
  </div>

  <script>
    const SUPABASE_URL = 'https://cadqyiezwqdhrinulzse.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_8j_PMspCDypszSJc4M8icg_Qf-3YO0U'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let role = null;

    document.getElementById('vFile').onchange = (e) => {
      document.getElementById('fileNameDisplay').innerText = e.target.files[0]?.name || '尚未選擇檔案';
    };

    function handleLogin() {
      const u = document.getElementById('u').value;
      const p = document.getElementById('p').value;
      if (u === 'admin' && p === 'Qingpu_2026!Gate#Pass') { role = 'teacher'; enterApp('教師'); }
      else if (u === '707' && p === '707') { role = 'student'; enterApp('學生'); }
      else alert('帳密錯誤');
    }

    function enterApp(label) {
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('appView').classList.remove('hidden');
      document.getElementById('userBadge').innerText = label;
      if (role === 'teacher') document.getElementById('adminPanel').classList.remove('hidden');
      fetchCourses();
    }

    // --- 核心上傳邏輯 ---
    async function uploadVideo() {
      const cat = document.getElementById('cat').value;
      const name = document.getElementById('vName').value;
      const file = document.getElementById('vFile').files[0];
      const btn = document.getElementById('uploadBtn');

      if (!cat || !name || !file) return alert('請填寫完整資訊並選擇檔案');

      btn.disabled = true;
      document.getElementById('progressBox').classList.remove('hidden');
      
      // 1. 上傳檔案到 Storage
      const fileName = `${Date.now()}_${file.name}`;
      const { data: storageData, error: storageError } = await _supabase.storage
        .from('videos')
        .upload(fileName, file);

      if (storageError) {
        alert('檔案上傳失敗：' + storageError.message);
        btn.disabled = false;
        return;
      }

      // 2. 取得公開網址
      const { data: { publicUrl } } = _supabase.storage.from('videos').getPublicUrl(fileName);

      // 3. 寫入資料庫
      const { error: dbError } = await _supabase.from('courses').insert([{ 
        category: cat, name: name, url: publicUrl, file_path: fileName 
      }]);

      if (dbError) alert('資料庫記錄失敗');
      else {
        alert('影片上傳成功！');
        fetchCourses();
      }
      
      btn.disabled = false;
      document.getElementById('progressBox').classList.add('hidden');
    }

    async function fetchCourses() {
      const { data, error } = await _supabase.from('courses').select('*').order('created_at', { ascending: false });
      const container = document.getElementById('courseList');
      const groups = (data || []).reduce((acc, obj) => {
        (acc[obj.category] = acc[obj.category] || []).push(obj);
        return acc;
      }, {});

      let html = '';
      for (const cat in groups) {
        html += `
          <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
            <div class="px-6 py-3 bg-slate-50 border-b font-black text-slate-500 text-sm uppercase">${cat}</div>
            ${groups[cat].map(i => `
              <div class="px-6 py-4 flex justify-between items-center border-b">
                <span class="font-bold">${i.name}</span>
                <div class="flex items-center gap-2">
                  <a href="${i.url}" target="_blank" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold">播放影片</a>
                  ${role === 'teacher' ? `<button onclick="deleteCourse('${i.id}', '${i.file_path}')" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }
      container.innerHTML = html || '<p class="text-center py-10 text-slate-300 font-bold">暫無影片</p>';
      lucide.createIcons();
    }

    async function deleteCourse(id, filePath) {
      if (!confirm('確定刪除影片？')) return;
      // 1. 刪除資料庫
      await _supabase.from('courses').delete().eq('id', id);
      // 2. 刪除雲端檔案 (如果有)
      if (filePath) await _supabase.storage.from('videos').remove([filePath]);
      fetchCourses();
    }

    lucide.createIcons();
  </script>
</body>
</html>
