<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青埔影音教學平台 | 偵錯強化版</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f8fafc; }
    .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
    video { width: 100%; border-radius: 1rem; background: #000; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
  </style>
</head>
<body>

  <div id="loginView" class="fixed inset-0 bg-slate-900 flex items-center justify-center p-4 z-50">
    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm border border-slate-100">
      <div class="text-center mb-10">
        <div class="bg-red-500 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 text-white shadow-lg animate-pulse">
          <i data-lucide="terminal"></i>
        </div>
        <h1 class="text-xl font-black text-slate-800 uppercase tracking-tight">Debug Mode On</h1>
        <p class="text-slate-400 text-xs mt-2 font-medium">偵錯模式已啟動，請嘗試登入</p>
      </div>
      <div class="space-y-4">
        <input id="u" type="text" placeholder="帳號 (admin / 707)" class="w-full border-2 border-slate-50 bg-slate-50 p-4 rounded-2xl outline-none focus:border-red-500 focus:bg-white transition-all font-bold">
        <input id="p" type="password" placeholder="密碼" class="w-full border-2 border-slate-50 bg-slate-50 p-4 rounded-2xl outline-none focus:border-red-500 focus:bg-white transition-all font-bold">
        <button onclick="handleDebugLogin()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-red-700 active:scale-95 transition-all">登入並檢查原因</button>
      </div>
    </div>
  </div>

  <div id="appView" class="hidden">
    <nav class="glass border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-10 shadow-sm">
      <div class="font-black text-red-600 text-lg flex items-center gap-2 italic">
        <i data-lucide="bug" class="w-5 h-5"></i> DEBUG.VERSION
      </div>
      <button onclick="location.reload()" class="text-slate-300 hover:text-red-500 transition-colors"><i data-lucide="log-out" class="w-5 h-5"></i></button>
    </nav>

    <main class="max-w-4xl mx-auto p-6 pb-24">
      <section id="adminPanel" class="hidden bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 mb-10">
        <h2 class="font-black text-slate-700 mb-6 flex items-center gap-2"><i data-lucide="upload"></i> 管理員：發佈課程</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input id="cat" type="text" placeholder="分類" class="border-2 border-slate-50 p-4 rounded-xl font-bold bg-slate-50 outline-none focus:border-red-500">
          <input id="vName" type="text" placeholder="名稱" class="border-2 border-slate-50 p-4 rounded-xl font-bold bg-slate-50 outline-none focus:border-red-500">
          <div class="md:col-span-2 border-2 border-dashed border-slate-200 p-8 rounded-2xl text-center cursor-pointer hover:bg-red-50/30 transition-all" onclick="document.getElementById('vFile').click()">
            <input id="vFile" type="file" accept="video/*" class="hidden">
            <p id="fileNameDisplay" class="text-sm font-black text-slate-400 italic">點擊選擇影片檔案</p>
          </div>
          <button id="uploadBtn" onclick="uploadVideo()" class="md:col-span-2 bg-slate-800 text-white py-5 rounded-2xl font-black shadow-xl hover:bg-black transition-all">開始上傳</button>
        </div>
      </section>
      <div id="courseList" class="space-y-8"></div>
    </main>
  </div>

  <script>
    const SUPABASE_URL = 'https://cadqyiezwqdhrinulzse.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_8j_PMspCDypszSJc4M8icg_Qf-3YO0U'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const T_HASH = "86782d1c67ca8d268802996d934277b0683058df3f24f5a3311904a4413e1f74"; // 教師
    const S_HASH = "9079590483863777d48347f892800164c9d9f58315270216b2518e3845b46d95"; // 學生

    async function sha256(str) {
      const buffer = new TextEncoder().encode(str);
      const hash = await crypto.subtle.digest('SHA-256', buffer);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    let role = null;

    // --- 🔍 核心：偵錯專用登入函式 ---
    async function handleDebugLogin() {
      const u = document.getElementById('u').value.trim(); // 去空格
      const p = document.getElementById('p').value.trim(); // 去空格
      
      if(!u || !p) {
        alert("⚠️ 帳號或密碼不能為空！");
        return;
      }

      const inputHash = await sha256(p);

      // 比對教師
      if (u === 'admin') {
        if (inputHash === T_HASH) { 
          role = 'teacher'; 
          enterApp('教師'); 
        } else {
          alert(`❌ 密碼錯誤！\n\n您輸入的密碼：[${p}]\n長度：${p.length}\n加密指紋：${inputHash.substring(0, 16)}...\n\n正確指紋應為：${T_HASH.substring(0, 16)}...`);
        }
      } 
      // 比對學生
      else if (u === '707') {
        if (inputHash === S_HASH) { 
          role = 'student'; 
          enterApp('學生'); 
        } else {
          alert(`❌ 學生密碼錯誤！\n\n您輸入的：[${p}]\n加密指紋：${inputHash.substring(0, 16)}...`);
        }
      } 
      else {
        alert(`❌ 帳號錯誤！\n系統找不到名為 [${u}] 的帳號。\n請輸入 admin 或 707。`);
      }
    }

    function enterApp(label) {
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('appView').classList.remove('hidden');
      if (role === 'teacher') document.getElementById('adminPanel').classList.remove('hidden');
      fetchCourses();
    }

    // --- 影片上傳邏輯 ---
    async function uploadVideo() {
      const cat = document.getElementById('cat').value.trim();
      const name = document.getElementById('vName').value.trim();
      const file = document.getElementById('vFile').files[0];
      const btn = document.getElementById('uploadBtn');

      if (!cat || !name || !file) return alert('請完整填寫並選擇檔案');

      btn.disabled = true;
      btn.innerText = '檔案正在飛向雲端...';
      
      const fileExt = file.name.split('.').pop();
      const safeFileName = `${Date.now()}.${fileExt}`;

      const { data, error: storageError } = await _supabase.storage.from('videos').upload(safeFileName, file);

      if (storageError) {
        alert('上傳失敗：' + storageError.message);
        btn.disabled = false;
        return;
      }

      const { data: { publicUrl } } = _supabase.storage.from('videos').getPublicUrl(safeFileName);
      await _supabase.from('courses').insert([{ category: cat, name: name, url: publicUrl, file_path: safeFileName }]);

      alert('上傳成功！');
      btn.disabled = false;
      btn.innerText = '開始上傳';
      fetchCourses();
    }

    async function fetchCourses() {
      const { data, error } = await _supabase.from('courses').select('*').order('created_at', { ascending: false });
      const container = document.getElementById('courseList');
      const groups = (data || []).reduce((acc, obj) => {
        (acc[obj.category] = acc[obj.category] || []).push(obj);
        return acc;
      }, {});

      let html = '';
      for (const cat in groups) {
        html += `
          <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="px-8 py-4 bg-slate-50 border-b font-black text-slate-400 text-xs uppercase">${cat}</div>
            <div class="p-4 space-y-4">
              ${groups[cat].map(i => `
                <div class="border rounded-2xl overflow-hidden bg-white">
                  <div class="px-6 py-4 flex justify-between items-center bg-white">
                    <span class="font-bold text-slate-700">${i.name}</span>
                    <div class="flex items-center gap-3">
                      <button onclick="togglePlayer('${i.id}')" class="bg-red-600 text-white px-5 py-2 rounded-xl text-xs font-black flex items-center gap-2">播放影片</button>
                      ${role === 'teacher' ? `<button onclick="deleteCourse('${i.id}', '${i.file_path}')" class="text-slate-300 hover:text-red-500 transition"><i data-lucide="trash-2" class="w-5 h-5"></i></button>` : ''}
                    </div>
                  </div>
                  <div id="player-${i.id}" class="hidden p-4 bg-slate-100">
                    <video controls controlsList="nodownload"><source src="${i.url}" type="video/mp4"></video>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }
      container.innerHTML = html || '<div class="text-center py-10 text-slate-300">目前沒有影片</div>';
      lucide.createIcons();
    }

    function togglePlayer(id) {
      const player = document.getElementById(`player-${id}`);
      const isHidden = player.classList.contains('hidden');
      document.querySelectorAll('[id^="player-"]').forEach(el => { el.classList.add('hidden'); el.querySelector('video').pause(); });
      if (isHidden) { player.classList.remove('hidden'); player.querySelector('video').play(); }
    }

    async function deleteCourse(id, filePath) {
      if (!confirm('確定刪除？')) return;
      await _supabase.from('courses').delete().eq('id', id);
      if (filePath) await _supabase.storage.from('videos').remove([filePath]);
      fetchCourses();
    }

    document.getElementById('vFile').onchange = (e) => { document.getElementById('fileNameDisplay').innerText = e.target.files[0]?.name || '尚未選擇檔案'; };
    lucide.createIcons();
  </script>
</body>
</html>
